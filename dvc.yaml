stages:
  # ── Scrape ───────────────────────────────────────────────────────────────────
  scrape_ufcstats:
    cmd: make scrape
    deps:
      - src/ufc_edge/data/ufcstats/
    outs:
      - data/raw/ufcstats.duckdb:
          cache: true
          persist: true
    desc: "Crawl ufcstats.com → DuckDB. TODO: wire real output path once stable."

  # ── Cross-check ──────────────────────────────────────────────────────────────
  # Kaggle cross-check dropped 2026-07-04 (.claude/spec/Key Design Decisions.md D8): Kaggle UFC
  # sets are mostly ufcstats rescrapes, so they validate nothing independently.
  # Replacement: a self-consistency validation suite (internal invariants +
  # independent spot-checks) — designed in LLD v1, stage to be added when built.
