# Fly.io app config for the Polymarket capture cron.
# Deploy from the repo root:
#   flyctl deploy --config deploy/fly.toml --dockerfile deploy/Dockerfile
app = "ufc-edge-capture"
primary_region = "sjc"

[build]

# Snapshots persist on a volume so machine restarts never lose history.
[mounts]
  source = "capture_data"
  destination = "/data"

# Worker process — no HTTP service. Keep exactly one machine running.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[restart]]
  policy = "always"
